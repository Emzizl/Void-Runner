<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Dodger</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

body{
    background:
    radial-gradient(circle at top,#1d2755 0%,#090b18 40%,#000 100%);
}

canvas{
    display:none;
    cursor:none;
}

#menu{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:
    radial-gradient(circle,#1c2250,#000);
    z-index:20;
}

#menu h1{
    font-size:72px;
    letter-spacing:3px;
    margin-bottom:40px;
    text-shadow:
        0 0 15px cyan,
        0 0 40px cyan;
    animation:titleFloat 3s ease-in-out infinite;
}

@keyframes titleFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

.map-select{
    display:flex;
    gap:25px;
    margin-bottom:35px;
}

.map{
    padding:18px 32px;
    border-radius:14px;
    border:2px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:.25s;
}

.map:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 0 20px cyan;
}

.map.active{
    background:cyan;
    color:#000;
    border-color:cyan;
    box-shadow:0 0 25px cyan;
}

button{
    padding:16px 45px;
    font-size:21px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
    transition:.25s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #00c6ff;
}

#ui{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 28px;
    border-radius:18px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 0 20px rgba(0,255,255,.25);
    font-size:22px;
    z-index:10;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
    text-align:center;
    padding:40px;
    border-radius:20px;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(15px);
    box-shadow:0 0 35px rgba(255,0,0,.35);
    animation:popup .35s;
}

@keyframes popup{
    from{
        opacity:0;
        transform:translate(-50%,-50%) scale(.8);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
}

#newRecord{
    display:none;
    color:gold;
    font-size:30px;
    margin-bottom:15px;
    text-shadow:0 0 20px gold;
}

#disclaimer{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.93);
    z-index:999;
}

#disclaimerContent{
    width:420px;
    max-width:90%;
    padding:35px;
    border-radius:20px;
    background:#181818;
    border:1px solid rgba(255,255,255,.15);
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,255,.25);
}

#disclaimerContent h2{
    margin-bottom:15px;
}

#disclaimerContent p{
    margin-bottom:20px;
    color:#ccc;
}
</style>
</head>

<body>

<!-- DISCLAIMER -->
<div id="disclaimer">
  <div id="disclaimerContent">
    <h2>Внимание!</h2>
    <p>Контент 18+</p>
    <button onclick="acceptDisclaimer()">Я согласен</button>
  </div>
</div>

<canvas id="game"></canvas>

<!-- MENU -->
<div id="menu">
    <h1>Space Dodger</h1>

    <div class="map-select">
        <div class="map active" data-map="space">🌌 Космос</div>
        <div class="map" data-map="winter">❄️ Зима</div>
    </div>

    <button id="startBtn">Играть</button>
</div>

<!-- UI -->
<div id="ui">
    Score: <span id="score">0</span> | Best: <span id="best">0</span>
</div>

<!-- GAME OVER -->
<div id="gameOver">
    <div id="newRecord">🏆 NEW RECORD!</div>
    Game Over<br><br>
    <button id="restartBtn">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// resize
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// DATA
let score = 0;
let best = localStorage.getItem("best") || 0;

// DISCLAIMER
function acceptDisclaimer(){
    localStorage.setItem("accepted", "true");
    document.getElementById("disclaimer").style.display = "none";
    showMenu();
}

window.onload = () => {
    if(localStorage.getItem("accepted") === "true"){
        document.getElementById("disclaimer").style.display = "none";
        showMenu();
    }
    document.getElementById("best").textContent = best;
};

function showMenu(){
    document.getElementById("menu").style.display = "flex";
    canvas.style.display = "block";
}

// particles
let stars = [];
function generateStars(){
    stars = [];
    for(let i=0;i<150;i++){
        stars.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*2+1,
            speed:Math.random()*0.5+0.2
        });
    }
}

// player
let player = { x:0, y:0, w:40, h:60 };

// enemies
let planets = [];
let gameOver = false;
let gameStarted = false;
let lastTime = 0;
let scoreTimer = 0;
let currentMap = "space";

// map select
document.querySelectorAll(".map").forEach(el=>{
    el.onclick = () => {
        document.querySelectorAll(".map").forEach(m=>m.classList.remove("active"));
        el.classList.add("active");
        currentMap = el.dataset.map;
        generateStars();
    }
});

// movement
function movePlayer(x){
    player.x = x - player.w/2;
}

canvas.addEventListener("mousemove", e=>{
    if(gameStarted) movePlayer(e.clientX);
});

canvas.addEventListener("touchmove", e=>{
    if(gameStarted) movePlayer(e.touches[0].clientX);
});

// START
document.getElementById("startBtn").onclick = () => {
    document.getElementById("menu").style.display = "none";
    gameStarted = true;

    player.x = canvas.width / 2;
    player.y = canvas.height - 120;
};

// collision
function collide(pl){
    return (
        player.x < pl.x + pl.r &&
        player.x + player.w > pl.x - pl.r &&
        player.y < pl.y + pl.r &&
        player.y + player.h > pl.y - pl.r
    );
}

// spawn enemies
function spawnPlanet(){
    let difficulty = 1 + score / 500;

    let typeRand = Math.random();
    let type;

    if(typeRand < 0.5) type = "normal";
    else if(typeRand < 0.75) type = "fast";
    else if(typeRand < 0.9) type = "big";
    else type = "chaser";

    let planet = {
        x: Math.random()*canvas.width,
        y: -50,
        type: type
    };

    if(type === "normal"){
        planet.r = 25;
        planet.speed = 3 * difficulty;
        planet.color = "orange";
    }

    if(type === "fast"){
        planet.r = 15;
        planet.speed = 6 * difficulty;
        planet.color = "red";
    }

    if(type === "big"){
        planet.r = 45;
        planet.speed = 2 * difficulty;
        planet.color = "purple";
    }

    if(type === "chaser"){
        planet.r = 20;
        planet.speed = 2.5 * difficulty;
        planet.color = "lime";
    }

    planets.push(planet);
}

// update
function update(delta){
    if(!gameStarted || gameOver) return;

    scoreTimer += delta;
    if(scoreTimer > 120){
        score++;
        scoreTimer = 0;
    }

    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    planets.forEach(pl=>{
        pl.y += pl.speed;

        if(pl.type === "chaser"){
            if(pl.x < player.x) pl.x += 2;
            if(pl.x > player.x) pl.x -= 2;
        }

        if(collide(pl)){
            gameOver = true;

            if(score > best){
                best = score;
                localStorage.setItem("best", best);
                document.getElementById("newRecord").style.display = "block";
            }

            document.getElementById("gameOver").style.display = "block";
        }
    });

    planets = planets.filter(pl => pl.y < canvas.height + 100);

    if(Math.random() < 0.04) spawnPlanet();

    document.getElementById("score").textContent = score;
    document.getElementById("best").textContent = best;
}

// draw
function draw(){
    ctx.fillStyle = currentMap === "winter" ? "#0a1a2f" : "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        s.y += currentMap === "winter" ? s.speed*2 : s.speed;

        if(s.y > canvas.height){
            s.y = 0;
            s.x = Math.random()*canvas.width;
        }
    });

    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    planets.forEach(pl=>{
        ctx.beginPath();

        if(pl.type === "fast"){
            ctx.fillStyle = "red";
            ctx.fillRect(pl.x - pl.r, pl.y - pl.r, pl.r*2, pl.r*2);
        }
        else{
            ctx.fillStyle = pl.color;
            ctx.arc(pl.x, pl.y, pl.r, 0, Math.PI*2);
        }

        ctx.fill();
    });
}

// loop
function loop(time=0){
    let delta = time - lastTime;
    lastTime = time;

    update(delta);
    draw();

    requestAnimationFrame(loop);
}

// restart
document.getElementById("restartBtn").onclick = () => {
    planets = [];
    score = 0;
    gameOver = false;
    gameStarted = false;

    document.getElementById("newRecord").style.display = "none";
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("menu").style.display = "flex";
};

// init
generateStars();
loop();
</script>

</body>
</html>
